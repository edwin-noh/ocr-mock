apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocr-app
  labels:
    app: ocr-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ocr-app
  template:
    metadata:
      labels:
        app: ocr-app
    spec:
      containers:
      - name: ocr-app
        image: quay.io/gunoh/edwin/ocr-app:v1
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: OCR_BASE_URL
          value: "http://ollama-service.your-namespace.svc:11434/v1"
        - name: OCR_MODEL_NAME
          value: "scb10x/typhoon-ocr1.5-3b"
        - name: OCR_API_KEY
          value: "ollama"
        resources:
          requests:
            cpu: "2"
            memory: "4Gi"
          limits:
            cpu: "4"
            memory: "8Gi"
        volumeMounts:
        - name: tmp-storage
          mountPath: /tmp
      volumes:
      - name: tmp-storage
        emptyDir: {}
      securityContext:
        runAsUser: 1001
        fsGroup: 1001